no_instance = "[dim]실행 중인 봇 인스턴스를 찾을 수 없습니다.[/dim]"

[lifecycle.uninstall]
title = "[bold red]ductor 삭제[/bold red]"
body = """\
[bold red]시스템에서 ductor가 영구적으로 제거됩니다.[/bold red]\n
  1. 실행 중인 봇 정지 (활성화된 경우)
  2. Docker 컨테이너 및 이미지 제거 (사용된 경우)
  3. ~/.tuner/의 모든 데이터 삭제
  4. ductor 패키지 삭제"""
confirm = "정말로 모든 요소를 삭제하시겠습니까?"
cancelled = "[dim]삭제가 취소되었습니다.[/dim]"
removing_image = "[dim]Docker 이미지 '{image}' 제거 중...[/dim]"
image_removed = "[green]Docker 이미지가 제거되었습니다.[/green]"
uninstalling = "[dim]ductor 패키지 제거 중...[/dim]"
delete_warning = "[yellow]경고: {home}을(를) 완전히 삭제할 수 없습니다 (일부 파일이 잠겨 있을 수 있음). 수동으로 제거하십시오.[/yellow]"
deleted = "[green]{home} 삭제됨[/green]"
done_title = "[bold green]안녕히 가십시오[/bold green]"
done_body = "[bold green]ductor가 완전히 제거되었습니다.[/bold green]\n\nductor를 이용해 주셔서 감사합니다!"

[lifecycle.upgrade]
dev_title = "[bold yellow]개발 설치[/bold yellow]"
dev_body = """\
[bold yellow]소스에서 실행 중 (편집 가능한 설치).[/bold yellow]\n
자체 업데이트를 사용할 수 없습니다.
프로젝트 디렉토리에서 [bold]git pull[/bold]을 실행하여 업데이트하십시오."""
title = "[bold cyan]ductor 업데이트 중...[/bold cyan]"
body = """\
  1. 봇을 안전하게 종료
  2. 최신 버전으로 업데이트
  3. 재시작"""
upgrading = "[dim]패키지 업데이트 중...[/dim]"
complete = "[green]업데이트 완료: {old} -> {new}[/green]"
unchanged = "[bold yellow]업데이트 후에도 버전이 변경되지 않았습니다 ({version}).[/bold yellow]\n자동 재시도가 시도되었으나, 아직 새로운 설치 버전이 확인되지 않았습니다."
restarting = "[dim]재시작 중...[/dim]"

[docker]
