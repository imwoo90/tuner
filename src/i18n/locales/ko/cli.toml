{detail}\n
[bold]유용한 명령어:[/bold]\n
  [cyan]ductor service status[/cyan]     실행 여부 확인
  [cyan]ductor service stop[/cyan]       서비스 정지
  [cyan]ductor service logs[/cyan]       {logs_hint}
  [cyan]ductor service uninstall[/cyan]  서비스 제거"""

[service.linux]
