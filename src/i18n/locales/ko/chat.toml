# 한국어 chat.toml

[session]
error_header = "**세션 오류**"
error_body = """\
[{model}] 오류가 발생했습니다.
세션이 보존되었습니다. 다시 시도하려면 다른 메시지를 전송하세요.
문제가 지속되면 /new를 사용하여 새 세션을 시작하세요."""
error_cause = "**원인:** {hint}"
error_detail = "**상세 정보:** `{detail}`"
error_auth = "인증 실패. CLI를 다시 인증하십시오 (예: `codex auth` 또는 API 키 확인)."
error_rate = "속도 제한에 도달했습니다. 잠시 후 다시 시도하십시오."
error_context = "컨텍스트 길이가 초과되었습니다. /new를 사용하여 새 세션을 시작하세요."

reset_header = "**세션 초기화**"
reset_body = """\
이 대화방에서 {provider}에 대한 세션이 초기화되었습니다.
다른 제공자 세션은 유지됩니다.
계속하려면 메시지를 보내십시오."""

age_warning = "[세션이 시작된 지 {age} 경과했습니다. 새 출발을 위해 /new를 사용하세요.]"
empty_turn = "_(에이전트가 자동으로 메모리를 업데이트했습니다. 계속하려면 다른 메시지를 보내세요.)_"
recovered = "_이전 세션을 복구할 수 없습니다. 새 세션이 자동으로 시작되었습니다._"
recovery_failed = "새로 시작한 후 세션을 복구할 수 없습니다. 다시 시도하거나 /new를 사용하여 다시 시작하세요."
sigkill = "실행이 중단되었습니다. 동일한 요청을 다시 보내주십시오."

not_found = "세션 '{name}'을(를) 찾을 수 없습니다."
ended = "세션 '{name}'이(가) 종료되었습니다. /session으로 새 세션을 시작하세요."
still_running = "세션 '{name}'이(가) 아직 처리 중입니다. 대기하거나 /stop을 사용하여 취소하십시오."

[stop]
header = "**에이전트 정지됨**"
killed = "{provider} 정지됨. 대기열에 있는 모든 메시지가 폐기되었습니다."
nothing = "현재 실행 중인 프로세스가 없습니다."

[interrupt]
done = "{count}개의 프로세스를 중단했습니다."
nothing = "활성 프로세스가 없습니다."

[abort_all]
done = "모든 에이전트에서 {count}개의 프로세스를 정지했습니다."
nothing = "에이전트에서 활성 프로세스를 찾을 수 없습니다."

[timeout]
error_header = "**시간 초과**"
error_body = """\
[{model}] CLI가 {minutes}분 후에 종료되었습니다.
세션이 보존되었습니다. 이전 단계에서 계속하려면 메시지를 전송하세요.
새 세션을 시작하려면 /new를 사용하세요."""

result_header = "**시간 초과**"
result_body = """\
에이전트가 {elapsed}초 후에 시간 초과되었습니다 (제한: {configured}초).
더 짧은 프롬프트를 시도하거나 더 작은 단계로 질문하세요."""

warning_minutes = "{mins}분 내 시간 초과"
warning_seconds = "{secs}초 내 시간 초과"
extended = "시간 초과 연장됨 (+{secs}초, {remaining}초 남음)"
generic = "에이전트 시간 초과. 다시 시도하십시오."

[startup]
first_start_header = "**봇 시작됨**"
first_start_body = "최초 시작 — 준비 완료."
reboot_header = "**봇 시작됨**"
reboot_body = "시스템 재부팅 감지됨 — 다시 온라인 상태입니다."
restart_default = "재시작 완료."
restart_header = "**재시작 중**"
restart_body = "봇이 곧 종료된 후 다시 시작됩니다."
upgrade_complete = "**업데이트 완료** `{old}` -> `{new}`"
matrix_restart = "**봇 재시작됨** ({reason})"
matrix_update = "**업데이트 가능:** `{version}`\n업데이트하려면 `/upgrade`를 사용하세요."
matrix_upgraded_restarting = "{old} → {new}로 업데이트됨. 재시작 중..."

[recovery]
named_header = "**자동 복구**"
named_body = "백그라운드 세션 **{session}** 재개 중\n`{preview}`"
interrupted_header = "**중단된 작업**"
